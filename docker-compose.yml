services:
  api:
    build:
      context: .
    container_name: porsche-api
    env_file:
      - .env
    ports:
      - "127.0.0.1:${HOST_PORT:-8061}:8000"
    environment:
      PORT: "8000"   # always 8000 inside container; HOST_PORT controls host mapping
    volumes:
      - ./data:/app/data
    restart: unless-stopped
