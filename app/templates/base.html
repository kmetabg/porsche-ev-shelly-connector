<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Porsche Connect{% endblock %}</title>
    <style>
        :root {
            --bg:         #080808;
            --surface:    #111111;
            --surface-2:  #1a1a1a;
            --border:     #272727;
            --gold:       #c9a84c;
            --gold-hover: #e2bf68;
            --text:       #efefef;
            --muted:      #777;
            --danger:     #e05252;
            --danger-bg:  rgba(224,82,82,.12);
            --success:    #4caf7d;
            --success-bg: rgba(76,175,125,.12);
            --warn-bg:    rgba(201,168,76,.12);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.65;
            min-height: 100vh;
        }
        a { color: var(--gold); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── NAV ── */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: .55rem;
            font-weight: 700;
            font-size: .95rem;
            letter-spacing: .12em;
            color: var(--gold);
            text-decoration: none;
        }
        .brand svg { width: 22px; height: 22px; }
        .nav-links { display: flex; align-items: center; gap: 1.4rem; }
        .nav-links a { color: var(--muted); font-size: .85rem; letter-spacing: .02em; }
        .nav-links a:hover { color: var(--text); text-decoration: none; }
        .nav-links .out { color: var(--danger); }

        /* ── LAYOUT ── */
        .wrap { max-width: 680px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
        .page-title { font-size: 1.45rem; font-weight: 700; margin-bottom: .2rem; }
        .page-sub   { color: var(--muted); font-size: .875rem; margin-bottom: 2rem; }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.75rem 2rem;
            margin-bottom: 1.25rem;
        }
        .card-title {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--gold);
            margin-bottom: 1.25rem;
        }

        /* ── FORMS ── */
        .field { margin-bottom: 1.1rem; }
        label {
            display: block;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
            margin-bottom: .35rem;
        }
        input[type=text],
        input[type=email],
        input[type=password] {
            width: 100%;
            padding: .6rem .9rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-size: .95rem;
            outline: none;
            transition: border-color .18s;
        }
        input:focus { border-color: var(--gold); }
        .hint { font-size: .75rem; color: var(--muted); margin-top: .3rem; }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .62rem 1.4rem;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 7px;
            font-size: .875rem;
            font-weight: 700;
            letter-spacing: .04em;
            cursor: pointer;
            transition: background .18s;
        }
        .btn:hover { background: var(--gold-hover); }
        .btn-full { width: 100%; justify-content: center; }

        /* ── ALERTS ── */
        .alert {
            padding: .7rem 1rem;
            border-radius: 7px;
            font-size: .85rem;
            margin-bottom: 1.1rem;
        }
        .alert-err  { background: var(--danger-bg);  border: 1px solid rgba(224,82,82,.35);  color: #f08080; }
        .alert-ok   { background: var(--success-bg); border: 1px solid rgba(76,175,125,.35); color: #7ed9a8; }
        .alert-warn { background: var(--warn-bg);     border: 1px solid rgba(201,168,76,.35); color: var(--gold); }

        /* ── MISC ── */
        hr { border: none; border-top: 1px solid var(--border); margin: 1.4rem 0; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: .4rem; vertical-align: middle; }
        .dot-ok  { background: var(--success); }
        .dot-err { background: var(--danger); }
        .chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .6rem; }
        .chip {
            font-family: "SF Mono", Consolas, monospace;
            font-size: .78rem;
            padding: .28rem .65rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--gold);
            text-decoration: none;
        }
        .chip:hover { border-color: var(--gold); text-decoration: none; }
        code {
            font-family: "SF Mono", Consolas, monospace;
            background: var(--surface-2);
            padding: .1em .35em;
            border-radius: 4px;
            font-size: .85em;
        }
    </style>
</head>
<body>

{% block nav %}
<nav>
    <a href="/" class="brand">
        <svg viewBox="0 0 22 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11 1L21 5.5V13C21 18.5 16.5 23.5 11 25C5.5 23.5 1 18.5 1 13V5.5L11 1Z"
                  stroke="#c9a84c" stroke-width="1.5" fill="none"/>
            <path d="M11 7V19M7 13H15" stroke="#c9a84c" stroke-width="1.2"/>
        </svg>
        PORSCHE CONNECT
    </a>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/settings">Settings</a>
        <a href="/docs">API</a>
        <a href="/logout" class="out">Logout</a>
    </div>
</nav>
{% endblock %}

<div class="wrap">
    {% block content %}{% endblock %}
</div>
</body>
</html>
